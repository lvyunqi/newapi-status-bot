# New API Status Bot 配置示例
#
# 安装位置：QimenBot/config/plugins/newapi-status-bot.toml
# QimenBot 会把此 TOML 转换为 JSON，并传给动态插件初始化钩子。
# 管理访问令牌不要写入本文件，只在 QimenBot 进程环境中设置。

[api]
# New API 站点根地址，不要包含 /api/log/ 等接口路径。
# 支持 http:// 和 https://，生产环境建议使用 HTTPS。
base_url = "https://apis.extralink.net"

# New API 管理员用户 ID，用于 New-Api-User 请求头，必须大于 0。
admin_user_id = 3

# 保存管理访问令牌的环境变量名。
# 插件读取该变量后，以原值 Authorization 请求头访问管理接口。
access_token_env = "NEWAPI_STATUS_ACCESS_TOKEN"

# 管理日志轮询间隔，单位秒，允许范围 10..=3600。
# 采集失败时会在此基础上指数退避，最长等待 300 秒。
poll_interval_secs = 30

# 数据库没有该模型游标时，首次采集向前回溯的小时数，允许范围 1..=720。
initial_backfill_hours = 24

# 每轮从上次游标向前重叠的秒数，允许范围 0..=3600。
# 重叠窗口用于接收延迟写入的日志；重复记录会由 sample_key 去重。
overlap_secs = 120

# 单次管理日志请求的分页大小，允许范围 1..=100。
page_size = 100

# 每个白名单模型单轮最多读取的页数，必须大于 0。
# 如果一个时间窗口超过容量，插件会缩小时间边界并在后续轮次继续追赶。
max_pages_per_model = 50

# 单次管理日志 HTTP 请求总超时，单位秒，允许范围 1..=120。
request_timeout_secs = 15

# 只有错误尝试、尚未看到最终消费日志时的结算宽限期，单位秒。
# 宽限期内状态保持 pending，超时后才记为最终失败。
settlement_grace_secs = 30

[storage]
# SQLite 文件相对于 QimenBot 数据目录的路径。
# 必须是非空相对路径，不允许绝对路径或 .. 上级目录。
database_file = "newapi-status-bot/status.db"

# 日志样本、请求结果和缓存的保留天数，允许范围 1..=30。
# 插件每日清理过期数据并执行 WAL checkpoint。
retention_days = 7

[status]
# 未在命令中指定窗口时使用的默认统计窗口。
# 可选值："1m"、"5m"、"10m"、"15m"、"1h"、"24h"、"7d"。
default_window = "15m"

# 状态判定需要的最少终态请求样本数。
# 样本少于该值且数据未过期时显示“样本不足”。
minimum_samples = 5

# 正常状态最低请求成功率，单位百分比，允许范围 0..=100。
# 成功率低于此值但不低于 degraded_success_rate 时显示“波动”。
normal_success_rate = 99.0

# 异常状态分界成功率，单位百分比，允许范围 0..=100。
# 成功率低于此值时显示“异常”，且不能高于 normal_success_rate。
degraded_success_rate = 95.0

# 模型没有单独配置 max_ttft_ms 时使用的默认 P95 首字耗时上限，单位毫秒。
# 超过上限会将状态降为“波动”。
default_max_ttft_ms = 12000

# 模型没有单独配置 max_total_ms 时使用的默认 P95 总耗时上限，单位毫秒。
# New API use_time 只有秒级精度，报告中不会伪造成精确毫秒。
default_max_total_ms = 30000

# 最新请求样本超过该时长后显示“数据过期”，单位秒。
# 数据过期也会被 anomaly 推送模式视为告警信号。
stale_after_secs = 180

[perf_metrics]
# 是否允许单模型查询调用公开 /api/perf-metrics 接口。
# 该数据只作为模型广场参考，不参与本地日志指标和状态判定。
enabled = true

# 公开性能数据的进程内缓存时间，单位秒，必须大于等于 0。
cache_ttl_secs = 300

# 公开性能接口请求超时，单位秒，允许范围 1..=3。
# 接口失败不会影响本地日志状态返回。
request_timeout_secs = 3

# 查询窗口小于 1 小时时，公开性能接口使用的默认小时数。
# 实际请求值会限制在 1..=720。
default_hours = 24

[bot]
# 允许使用普通查询命令的 QQ 群号列表，群号使用字符串。
# 空列表表示不限制群聊；私聊不使用该列表。
allowed_group_ids = []
# 示例：allowed_group_ids = ["123456789", "987654321"]

# 允许私聊查询以及执行管理命令的 QQ 用户号列表，用户号使用字符串。
# 空列表表示不增加插件级限制；管理命令仍需 QimenBot 判定为 admin 角色。
admin_user_ids = []
# 示例：admin_user_ids = ["10001", "10002"]

# 单条 QQ 消息允许的最大字符数，不能小于 200。
# 超长状态、模型列表和异常报告会按模型边界拆分发送。
max_message_chars = 1800

[push]
# 是否启用采集线程实时主动推送。
# 启用后必须通过一个或多个 [[push.targets]] 显式指定 account_id（或 bot_id）、目标类型和目标 ID。
# 如果未配置目标，插件会记录“推送未配置”，不会回退到旧 target_group_ids。
enabled = false

# 推送模式：
# - "periodic"：按 interval_secs 周期发送完整状态；
# - "change"：状态连续确认发生变化后发送；
# - "anomaly"：异常/过期时发送，恢复后再发送一次。
mode = "change"

# periodic 模式的推送周期，单位秒；启用推送时不能小于 30。
interval_secs = 3600

# 同一候选状态需要连续采集命中的次数，最小有效值为 1。
# 告警和恢复都使用该确认次数，避免瞬时波动触发通知。
confirmations = 2

# change/anomaly 模式两次推送之间的冷却时间，单位秒。
cooldown_secs = 900

# 实时推送目标。推荐使用 account_id，OneBot 通常填写 Bot QQ / self_id；
# 该值必须同时配置在 QimenBot config/base.toml 的 [[bots]].account_id 中。
# 需要锁定某个部署实例或传输方式时，可以改用 [[bots]].id 对应的 bot_id。
# 每个目标必须且只能设置 account_id、bot_id 其中一个。
# kind 可选 private、group、channel、channel_private。
# OneBot 11 频道/频道私信通常需要额外 guild_id；QQ 官方频道可按实际接口保留或省略。
#
# [[push.targets]]
# account_id = "2733944636"
# kind = "group"
# target_id = "123456789"
#
# [[push.targets]]
# account_id = "2733944636"
# kind = "private"
# target_id = "10001"
#
# [[push.targets]]
# account_id = "2733944636"
# kind = "channel"
# target_id = "channel_id"
# guild_id = "guild_id"
#
# [[push.targets]]
# bot_id = "qq-official"
# kind = "channel_private"
# target_id = "guild_or_user_id"
# guild_id = "optional_onebot_guild_id"

# 模型白名单。至少配置一个 [[models]]，name 不能重复。
# 插件会逐个模型调用日志接口的 model_name 过滤，不会抓取全站日志。
[[models]]
# New API 日志中的精确 model_name，也是单模型查询的主名称。
name = "gpt-5.6-terra"

# QQ 报告中显示的名称；留空时直接显示 name。
display_name = "GPT-5.6 Terra"

# 需要展示和计入模型总体状态的 New API 分组。
# 空列表表示展示日志中发现的全部分组。
# 即使配置了过滤，无法确认归属的错误仍显示在“自动路由/未确认”。
groups = ["Codex Burst", "Codex Plus"]

# 该模型的 P95 首字耗时上限，单位毫秒；省略时使用 status.default_max_ttft_ms。
max_ttft_ms = 12000

# 该模型的 P95 总耗时上限，单位毫秒；省略时使用 status.default_max_total_ms。
max_total_ms = 30000

# 继续添加模型时复制完整的 [[models]] 区块，并修改 name、显示名、分组和阈值。

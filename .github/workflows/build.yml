name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  build:
    name: Build ${{ matrix.name }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-22.04
            artifact: newapi-status-bot-linux-x86_64
            library: target/release/libqimen_dynamic_plugin_newapi_status.so
          - name: Windows x86_64
            os: windows-latest
            artifact: newapi-status-bot-windows-x86_64
            library: target/release/qimen_dynamic_plugin_newapi_status.dll
          - name: macOS x86_64
            os: macos-15-intel
            artifact: newapi-status-bot-macos-x86_64
            library: target/release/libqimen_dynamic_plugin_newapi_status.dylib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build release plugin
        run: cargo build --release --locked

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.library }}
            config.example.toml
            README.md
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Package release assets
        shell: bash
        run: |
          mkdir -p packages
          tar -czf packages/newapi-status-bot-linux-x86_64.tar.gz \
            -C release-assets/newapi-status-bot-linux-x86_64 .
          (cd release-assets/newapi-status-bot-windows-x86_64 && \
            zip -rq ../../packages/newapi-status-bot-windows-x86_64.zip .)
          tar -czf packages/newapi-status-bot-macos-x86_64.tar.gz \
            -C release-assets/newapi-status-bot-macos-x86_64 .

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" packages/* --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" packages/* \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY"
          fi
